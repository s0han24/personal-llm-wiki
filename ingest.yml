name: Wiki Ingest

on:
  push:
    paths:
      - "raw/**"
    branches:
      - main

permissions:
  contents: write # needed to commit wiki updates back

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need parent commit to diff new files

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Find new/changed source files
        id: changed
        run: |
          git diff --name-only --diff-filter=AM HEAD~1 HEAD -- 'raw/**' > /tmp/changed_sources.txt
          echo "Files to ingest:"
          cat /tmp/changed_sources.txt
          COUNT=$(wc -l < /tmp/changed_sources.txt | tr -d ' ')
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Ingest each new source
        if: steps.changed.outputs.count != '0'
        env:
          # PAT with "Copilot Requests" permission — store as repo secret
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_TOKEN }}
        run: |
          while IFS= read -r source_file; do
            if [[ -n "$source_file" && -f "$source_file" ]]; then
              echo "==> Ingesting: $source_file"
              python wiki_runner.py ingest "$source_file"
            fi
          done < /tmp/changed_sources.txt

      - name: Commit wiki updates
        if: steps.changed.outputs.count != '0'
        run: |
          git config user.name  "wiki-bot"
          git config user.email "wiki-bot@users.noreply.github.com"
          git add wiki/
          git diff --cached --quiet || git commit -m "wiki: auto-ingest $(date +%Y-%m-%d)"
          git push
